# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/hypr_collors.conf

################
### Variables ##
################

$relogio = ~/custom/scripts/data.sh
$rel_css = ~/custom/css/relogio.css

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use

$terminal = kitty
$fileManager = nautilus
$menu = ~/custom/rofi/scripts/launcher.sh
$browser = brave
$code = zeditor

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar &

# [Inicia O Awww e o relogio]
exec-once = awww-daemon
exec-once = nwg-wrapper -s $relogio -c $rel_css -p center -r 1000
exec-once = nm-appet

#[Inicia o wl-clipboard e o cliphist]
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 3

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color1 $color5 45deg
    col.inactive_border = $background

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 15
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = $background
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        ignore_opacity = true
        noise = 0
        contrast = 1.0
        brightness = 1.0
        xray = false
        new_optimizations = true

        #vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float =/.config/rofi/custom/keybinds.sh false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    #pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# Sets "Windows" key as main modifier
$mainMod = SUPER

#Seta a variavel de -modi do Rofi
$modification = -modi "drun,run,filebrowser,atalhos:${HOME}/custom/rofi/scripts/keybinds.sh"

#Seta a variavel de thema do Rofi
$theme = -theme ~/custom/rofi/style-5.rasi

#seta a variavel para o laucher de arquivos do rofi
$laucher = -filebrowser-command "${HOME}/custom/rofi/scripts/arquivos.sh"

#seta variaveis de processos dos menus do rofi
$keys = rofi -show atalhos $modification $theme
$arq = rofi -show filebrowser $modification $laucher $theme
$clipboard = cliphist list | rofi -dmenu $theme | cliphist decode | wl-copy

#personalizadas

# [Comandos do Rofi]
bindd = $mainMod, K, Mostrar Keybinds, exec, $keys
bindd = $mainMod SHIFT, E, Abrir arquivos no rofi, exec, $arq
bindd = $mainMod SHIFT, C, ClipBoard, exec, $clipboard

# [waybar]
bindd = $mainMod, R, Reiniciar waybar, exec, sh -c "pkill waybar; waybar &"

# [Modo Janela]
bindd = $mainMod, F, Modo Janela, fullscreen, 1
# [Tela Cheia]
bindd = $mainMod SHIFT, F, Tela Cheia, fullscreen, 0

# [Mover janela para a direita]
bindd = $mainMod SHIFT, right, Mover janela para a direita, movewindow, r
# [Mover janela para a esquerda]
bindd = $mainMod SHIFT, left, Mover janela para a esquerda, movewindow, l
# [Mover janela para cima]
bindd = $mainMod SHIFT, up, Mover janela para cima, movewindow, u
# [Mover janela para baixo]
bindd = $mainMod SHIFT, down, Mover janela para baixo, movewindow, d

# [Abrir navegador]
bindd = $mainMod, P, Abrir navegador, exec, $browser

# [Aumentar volume + % 5]
binded = , XF86AudioRaiseVolume, Aumentar volume + % 5, exec, wpctl set-volume -1 1.4 @DEFAULT_AUDIO_SINK@ 5%+
# [Diminuir volume - % 5]
binded = , XF86AudioLowerVolume, Diminuir volume - % 5, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
# [Aumentar Brilho + % 5]
binded = ,XF86MonBrightnessUp, Aumentar Brilho + % 5, exec, brightnessctl -e4 -n2 set 5%+
# [Diminuir Brilho - % 5]
binded = ,XF86MonBrightnessDown, Diminuir Brilho - % 5, exec, brightnessctl -e4 -n2 set 5%-

# [Abrir CODE EDITOR]
bindd = $mainMod, X, Abrir CODE EDITOR, exec, $code
# [Seletor de Wallpaper]
bindd = $mainMod SHIFT, I, Seletor de Wallpaper, exec, waypaper --folder ~/Imagens/Wallpapers
# [Seletor de Wallpaper animado]
bindd = $mainMod SHIFT, V, Seletor de Wallpaper animado, exec, waypaper --folder ~/Imagens/videos

#bind = $mainMod, W, exec, wallpaper
#bind = $mainMod SHIFT, W, exec, wallpaper -v

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# [Abrir Terminal]
bindd = $mainMod, Return, Abrir Terminal, exec, $terminal
# [Encerrar Programa]
bindd = $mainMod, C, Encerrar Programa, killactive,
# [Encerra Sessão]
bindd = $mainMod, M, Encerra Sessão, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
# [Abrir Gerenciador de Arquivos]
bindd = $mainMod, E, Abrir Gerenciador de Arquivos, exec, $fileManager
# [Janela Flutuante]
bindd = $mainMod, Space, Janela Flutuante, togglefloating,
# [Abrir menu aplicativos]
bindd = $mainMod, D, Abrir menu aplicativos, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
# [Muda orientação das janelas]
bindd = $mainMod, J, Muda orientação das janelas, layoutmsg, togglesplit

# Move focus with mainMod + arrow keys
# [Move o foco para a esquerda]
bindd = $mainMod, left, Move o foco para a esquerda, movefocus, l
# [Move o foco para a direita]
bindd = $mainMod, right, Move o foco para a direita, movefocus, r
# [Move o foco para a cima]
bindd = $mainMod, up, Move o foco para a cima, movefocus, u
# [Move o foco para baixo]
bindd = $mainMod, down, Move o foco para baixo, movefocus, d

# Switch workspaces with mainMod + [0-9]
# [Muda para a area de trabalho]
bindd = $mainMod, 1, Muda para a area de trabalho 1, workspace, 1
bindd = $mainMod, 2, Muda para a area de trabalho 2, workspace, 2
bindd = $mainMod, 3, Muda para a area de trabalho 3, workspace, 3
bindd = $mainMod, 4, Muda para a area de trabalho 4, workspace, 4
bindd = $mainMod, 5, Muda para a area de trabalho 5, workspace, 5
bindd = $mainMod, 6, Muda para a area de trabalho 6, workspace, 6
bindd = $mainMod, 7, Muda para a area de trabalho 7, workspace, 7
bindd = $mainMod, 8, Muda para a area de trabalho 8, workspace, 8
bindd = $mainMod, 9, Muda para a area de trabalho 9, workspace, 9
bindd = $mainMod, 0, Muda para a area de trabalho 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
# [Move a janela para a area de trabalho]
bindd = $mainMod SHIFT, 1, Move a janela para a area de trabalho 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move a janela para a area de trabalho 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move a janela para a area de trabalho 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move a janela para a area de trabalho 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move a janela para a area de trabalho 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move a janela para a area de trabalho 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move a janela para a area de trabalho 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move a janela para a area de trabalho 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move a janela para a area de trabalho 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move a janela para a area de trabalho 10, movetoworkspace, 10

# Example special workspace (scratchpad)
# [Area de trabalho especial]
bindd = $mainMod, S, Area de trabalho especial, togglespecialworkspace, magic
# [Move a janela para a area de trabalho especial]
bindd = $mainMod SHIFT, S, Move a janela para a area de trabalho especial, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# [Muda area de trabalho usando o mouse]
bindd = $mainMod, mouse_down, Muda area de trabalho usando o mouse, workspace, e+1
# [Muda area de trabalho usando o mouse]
bindd = $mainMod, mouse_up, Muda area de trabalho usando o mouse, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness (sem descrição declarada)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
# [Play next music]
bindld = , XF86AudioNext, Play next music, exec, playerctl next
# [Pause music]
bindld = , XF86AudioPause, Pause music, exec, playerctl play-pause
# [Play music]
bindld = , XF86AudioPlay, Play music, exec, playerctl play-pause
# [Play previous music]
bindld = , XF86AudioPrev, Play previous music, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
windowrule = float 1, match:class ^(waypaper)$
windowrule = opacity 0.8, match:class ^(waypaper)$
windowrule = size 900 500, match:class ^(waypaper)$

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
